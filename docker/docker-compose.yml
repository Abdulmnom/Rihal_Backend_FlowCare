version: "3.8"

services:
  # ============ PostgreSQL Database ============
  postgres:
    image: postgres:16-alpine
    container_name: flowcare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: flowcare_secure_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d flowcare" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ FlowCare API ============
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: flowcare-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flowcare
      DB_USER: postgres
      DB_PASSWORD: flowcare_secure_pass_2026
      JWT_SECRET: flowcare-jwt-secret-change-in-production-2026
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: flowcare-refresh-secret-change-in-production-2026
      JWT_REFRESH_EXPIRES_IN: 7d
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 5242880
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo '⏳ Running migrations...' &&
        npx knex migrate:latest --knexfile knexfile.js &&
        echo '⏳ Running seed data...' &&
        npx knex seed:run --knexfile knexfile.js &&
        echo '🚀 Starting FlowCare API...' &&
        node src/server.js
      "

volumes:
  pgdata:
    driver: local
